name: OmniRoute combos

on:
  push:
    branches: [main]
    paths:
      - "dokploy/runner-web/settings/combos.yml"
      - ".github/scripts/sync-omniroute-combos.ts"
      - ".github/workflows/omniroute-combos.yml"

permissions:
  contents: read

jobs:
  sync:
    name: Sync omni.tux.bd
    runs-on: ubuntu-latest
    environment: omni.tux.bd
    steps:
      - uses: actions/checkout@v7
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Apply combo sync
        env:
          OMNIROUTE_API_KEY: ${{ secrets.OMNIROUTE_API_KEY }}
        run: deno run --allow-read=dokploy/runner-web/settings/combos.yml --allow-net --allow-env=OMNIROUTE_API_KEY .github/scripts/sync-omniroute-combos.ts
