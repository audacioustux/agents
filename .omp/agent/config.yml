setupVersion: 1
theme: 
  dark: dark
  light: light
symbolPreset: ascii
statusLine: 
  preset: full
  separator: slash
  transparent: true
  sessionAccent: true
display: 
  showTokenUsage: false
  shimmer: kitt
task: 
  showResolvedModelBadge: true
  enableLsp: true
defaultThinkingLevel: auto
memory: 
  backend: "off"
enabledModels: 
  - omniroute/auto/smart
  - omniroute/pro-chat
  - omniroute/best-chat
  - omniroute/chat
  - omniroute/claude-opus
  - omniroute/claude-sonnet
  - omniroute/pro-coding
  - omniroute/best-coding
  - omniroute/coding
  - omniroute/best-coding-fast
  - omniroute/pro-fast
  - omniroute/best-fast
  - omniroute/fast
  - omniroute/best-free
  - omniroute/pro-reasoning
  - omniroute/best-reasoning
  - omniroute/reasoning
  - omniroute/pro-vision
  - omniroute/best-vision
modelRoles: 
  default: omniroute/pro-coding:xhigh
  smol: omniroute/coding:off
  slow: omniroute/best-reasoning:xhigh
  plan: omniroute/pro-reasoning:xhigh
  commit: omniroute/best-coding-fast:medium
  vision: omniroute/pro-vision:high
  designer: omniroute/pro-vision:xhigh
  task: omniroute/best-coding:high
  advisor: omniroute/reasoning:xhigh
  tiny: omniroute/pro-fast:off
retry: 
  enabled: true
  maxRetries: 100
  baseDelayMs: 10000
  modelFallback: true
  fallbackRevertPolicy: cooldown-expiry
  fallbackChains: 
    default: 
      - omniroute/best-coding:xhigh
    smol: 
      - omniroute/best-coding:off
      - omniroute/auto/smart:xhigh
    slow: 
      - omniroute/reasoning:xhigh
    plan: 
      - omniroute/best-reasoning:xhigh
    commit: 
      - omniroute/best-coding:medium
      - omniroute/auto/smart:high
    vision: 
      - omniroute/best-vision:high
    designer: 
      - omniroute/best-vision:xhigh
    task: 
      - omniroute/coding:high
    advisor: 
      - omniroute/best-reasoning:xhigh
    tiny:
      - omniroute/best-fast:off
      - omniroute/auto/smart:xhigh
tui: 
  tight: false
advisor: 
  enabled: true
  syncBacklog: "1"
  subagents: false
features: 
  unexpectedStopDetection: true
autolearn: 
  enabled: true
lsp: 
  formatOnWrite: true
  diagnosticsOnEdit: true
inspect_image: 
  enabled: true
checkpoint: 
  enabled: true
github: 
  enabled: true
  cache: 
    enabled: true
secrets: 
  enabled: true
compaction: 
  thresholdPercent: -1
  thresholdTokens: 500000
  handoffSaveToDisk: true
  idleEnabled: true
  strategy: context-full
  idleTimeoutSeconds: 1800
  idleThresholdTokens: 400000
terminal: 
  showProgress: true
snapcompact: 
  toolResults: false
interruptMode: immediate
branchSummary: 
  enabled: true
bashInterceptor: 
  enabled: false
shellMinimizer: 
  sourceOutlineLevel: default
bash: 
  autoBackground: 
    enabled: false
todo: 
  eager: preferred
contextPromotion: 
  enabled: false
browser: 
  headless: true
