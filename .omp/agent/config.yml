setupVersion: 1
theme: 
  dark: dark
  light: light
symbolPreset: ascii
statusLine: 
  preset: full
  separator: slash
  transparent: true
  sessionAccent: true
display: 
  showTokenUsage: false
  shimmer: classic
task: 
  showResolvedModelBadge: true
  enableLsp: true
defaultThinkingLevel: auto
memory: 
  backend: mnemopi
enabledModels: 
  - omniroute/auto/smart
  - omniroute/pro-chat
  - omniroute/best-chat
  - omniroute/chat
  - omniroute/claude-opus
  - omniroute/claude-sonnet
  - omniroute/pro-coding
  - omniroute/best-coding
  - omniroute/coding
  - omniroute/best-coding-fast
  - omniroute/pro-fast
  - omniroute/best-fast
  - omniroute/fast
  - omniroute/best-free
  - omniroute/pro-reasoning
  - omniroute/best-reasoning
  - omniroute/reasoning
  - omniroute/pro-vision
  - omniroute/best-vision
modelRoles: 
  default: omniroute/best-chat
  smol: omniroute/chat
  slow: omniroute/pro-chat
  plan: omniroute/pro-reasoning
  commit: omniroute/best-coding-fast
  vision: omniroute/best-vision
  designer: omniroute/pro-vision
  task: omniroute/pro-coding
  advisor: omniroute/best-reasoning
  tiny: omniroute/fast
retry: 
  enabled: true
  maxRetries: 100
  baseDelayMs: 10000
  modelFallback: true
  fallbackRevertPolicy: cooldown-expiry
  fallbackChains: 
    default: 
      - omniroute/chat
    smol: 
      - omniroute/fast
      - omniroute/auto/smart
    slow: 
      - omniroute/best-chat
    plan: 
      - omniroute/best-reasoning
    commit: 
      - omniroute/best-fast
      - omniroute/auto/smart
    vision: 
      - omniroute/best-chat
    designer: 
      - omniroute/best-vision
    task: 
      - omniroute/best-coding
    advisor: 
      - omniroute/reasoning
    tiny: 
      - omniroute/best-free
      - omniroute/auto/smart
tui: 
  tight: false
advisor: 
  enabled: true
  syncBacklog: "off"
  subagents: false
features: 
  unexpectedStopDetection: true
autolearn: 
  enabled: true
lsp: 
  formatOnWrite: true
  diagnosticsOnEdit: true
inspect_image: 
  enabled: true
checkpoint: 
  enabled: true
github: 
  enabled: true
  cache: 
    enabled: true
secrets: 
  enabled: true
compaction: 
  thresholdPercent: -1
  thresholdTokens: 500000
  handoffSaveToDisk: true
  idleEnabled: true
  strategy: context-full
  idleTimeoutSeconds: 1800
  idleThresholdTokens: 400000
terminal: 
  showProgress: true
snapcompact: 
  toolResults: false
interruptMode: immediate
branchSummary: 
  enabled: true
bashInterceptor: 
  enabled: false
shellMinimizer: 
  sourceOutlineLevel: default
bash: 
  autoBackground: 
    enabled: false
todo: 
  eager: preferred
contextPromotion: 
  enabled: false
browser: 
  headless: true
dev: 
  autoqa: 
    consent: denied
