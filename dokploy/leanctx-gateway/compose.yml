services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: leanctx
      POSTGRES_DB: leanctx
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leanctx -d leanctx"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - dokploy-network

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        LEANCTX_VERSION: ${LEANCTX_VERSION:?set LEANCTX_VERSION}
    image: leanctx:${LEANCTX_VERSION:?set LEANCTX_VERSION}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./config.toml:/etc/lean-ctx/config.toml:ro
      - ./gateway-keys.toml:/etc/lean-ctx/gateway-keys.toml:ro
    expose:
      - "8484"
      - "8485"
    networks:
      - dokploy-network

  # Read path — shared multi-repo context/index server (`ctx_*` tools over
  # MCP + REST/SSE). Distinct from the gateway above: this never touches
  # model traffic, it serves search/index/memory over the mounted repos.
  team:
    image: leanctx:${LEANCTX_VERSION:?set LEANCTX_VERSION}
    restart: unless-stopped
    env_file: .env
    command: ["team", "serve", "--config", "/etc/lean-ctx/team.json"]
    volumes:
      - ./team.json:/etc/lean-ctx/team.json:ro
      - ./repos.conf:/etc/lean-ctx/repos.conf:ro
      - repos:/srv/repos
      - teamdata:/var/lib/lean-ctx
    expose:
      - "8686"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true

volumes:
  pgdata:
  repos:
  teamdata:
