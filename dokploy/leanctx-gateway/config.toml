# lean-ctx gateway configuration — generated by `lean-ctx gateway init`.
# Secrets never live here: tokens and DATABASE_URL come from .env.

# Bind beyond loopback (the container/K8s case) and require Bearer auth.
proxy_bind_host = "0.0.0.0"
proxy_require_token = true
proxy_allowed_hosts = ["localhost", "127.0.0.1", "lean.tux.bd"]
proxy_max_rps = 50

[gateway_server]
admin_bind_host = "0.0.0.0"
seats = 10
org_label = "AudaciousTux"

# Counterfactual baseline: what the org would have paid without lean-ctx.
[proxy.baseline]
reference_model = "claude-sonnet-4-5"

[proxy]
meter_openai_usage = true
allow_custom_upstream = true

[[proxy.providers]]
id = "omniroute"
shape = "openai"
base_url = "https://omni.tux.bd"
api_key_env = "OMNIROUTE_API_KEY"
local = false

# Registry providers (optional). Built-in routes work without any entry:
#   /anthropic/…  /openai/…  /gemini/…
# Add self-hosted or Foundry endpoints like this:
# [[proxy.providers]]
# id = "local"
# shape = "openai"
# base_url = "http://host.docker.internal:11434"
# local = true   # billed at the shadow rate, not cloud list prices
# # plain-HTTP non-loopback upstream additionally needs:
# # [proxy] allow_insecure_http_upstream = true
#
# [[proxy.providers]]
# id = "foundry"
# shape = "openai"
# base_url = "https://<resource>.services.ai.azure.com/models"
# api_key_env = "FOUNDRY_API_KEY"

# Active routing (optional): aliases + tier targets, see docs/reference/05-advanced.md.
# Aliases are your org's model namespace — clients discover them via
# GET /v1/models on the proxy port and select them by name in the IDE:
# [proxy.routing]
# enabled = true
# [proxy.routing.aliases]
# "acme/fast" = "foundry:gpt-4o-mini"      # org name -> provider:model
# "acme/local" = "local:llama3.3"          # local target (shadow rate)
