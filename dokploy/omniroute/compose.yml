services:
  redis:
    image: redis:8.6.2-alpine
    container_name: omniroute-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  omniroute:
    container_name: omniroute
    depends_on:
      redis:
        condition: service_healthy
    image: diegosouzapw/omniroute:latest-web
    pull_policy: always
    restart: unless-stopped
    stop_grace_period: 40s
    environment:
      PORT: ${PORT}
      HOSTNAME: ${HOSTNAME}
      DATA_DIR: ${DATA_DIR}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
      OMNIROUTE_MEMORY_MB: ${OMNIROUTE_MEMORY_MB}
      NODE_OPTIONS: ${NODE_OPTIONS}
      OMNIROUTE_CHAT_HEAP_SHED_RATIO: ${OMNIROUTE_CHAT_HEAP_SHED_RATIO}
      OMNIROUTE_CHAT_LARGE_BODY_BYTES: ${OMNIROUTE_CHAT_LARGE_BODY_BYTES}
      OMNIROUTE_CHAT_HARD_MAX_BODY_BYTES: ${OMNIROUTE_CHAT_HARD_MAX_BODY_BYTES}
      OMNIROUTE_MAX_NONSTREAMING_RESPONSE_BYTES: ${OMNIROUTE_MAX_NONSTREAMING_RESPONSE_BYTES}
    volumes:
      - omniroute-data:/app/data
    healthcheck:
      test: ["CMD", "node", "healthcheck.mjs"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - dokploy-network
    ports:
      - ${PORT:?}
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

networks:
  dokploy-network:
    external: true

volumes:
  omniroute-data:
  redis-data:
